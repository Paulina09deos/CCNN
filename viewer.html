<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Visor de realidad aumentada</title>
  <meta name="description" content="Visor AR.js NFT para mostrar un modelo GLB sobre una imagen marcador.">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar-nft.js"></script>
  <script src="js/viewer.js" defer></script>
</head>
<body class="viewer-body">
  <div class="ar-overlay">
    <div class="status-card">
      <p class="status-title">Realidad aumentada educativa</p>
      <p data-ar-status>Permite el uso de la camara.</p>
      <p class="small-text">Apunta la camara hacia la imagen marcador.</p>
    </div>
    <a class="viewer-link" href="index.html">Inicio</a>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    loading-screen="enabled: false">

    <!--
      Esquema base solicitado:
      <a-nft type="nft" url="assets/markers/marcador">
        <a-entity gltf-model="assets/models/modelo.glb" scale="5 5 5" position="0 0 0" rotation="0 0 0"></a-entity>
      </a-nft>
    -->
    <a-entity id="ar-content-root"></a-entity>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
